version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns:
          - 'astro'
          - '@astrojs/*'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
      tooling:
        patterns:
          - 'eslint*'
          - 'prettier*'
          - 'typescript'
          - 'vitest*'
          - '@vitest/*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
