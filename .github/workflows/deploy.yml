name: Deploy

# Deploy NUR von main: GitHub Pages hat genau ein Deployment-Ziel (Production).
# Feature-Branches (claude/**) wuerden sonst bei jedem Push einen Production-
# Deploy versuchen — das github-pages-Environment lehnt das ab (Protection
# Rule "main only") und jeder Branch-Push endet mit einem roten Deploy-Run.
# Branch-Validierung uebernimmt ci.yml (Lint/Typecheck/Tests/Build).
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_RESTAURANT_WHATSAPP: '491742116095'
      PUBLIC_SITE_URL: 'https://beko2210.github.io/pimp-my-kebap'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

