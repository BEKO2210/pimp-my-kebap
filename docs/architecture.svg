<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" role="img" aria-labelledby="archTitle archDesc" font-family="ui-sans-serif, system-ui, sans-serif">
  <title id="archTitle">Pimp My Kebap — Systemarchitektur</title>
  <desc id="archDesc">Statische Website auf GitHub Pages, hydrate Astro-Islands im Browser, Bestellung via WhatsApp Click-to-Chat. Kein Backend, keine Datenbank, keine Cookies.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="goldFade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#d4af37"/>
    </marker>
    <style>
      .card { fill: #1a1a1a; stroke: rgba(212,175,55,.32); stroke-width: 1; }
      .card-strong { fill: #232323; stroke: #d4af37; stroke-width: 1.5; }
      .label { fill: #d4af37; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
      .heading { fill: #f8f3e6; font-size: 16px; font-weight: 700; }
      .body { fill: #f8f3e6; font-size: 12px; opacity: .8; }
      .pill { fill: #232323; stroke: rgba(212,175,55,.4); stroke-width: 1; }
      .pill-text { fill: #f8f3e6; font-size: 10.5px; }
      .arrow { stroke: #d4af37; stroke-width: 1.6; fill: none; opacity: .85; }
      .accent { fill: #ff6b1a; }
    </style>
  </defs>

  <rect width="880" height="480" fill="url(#bg)"/>
  <rect x="40" y="20" width="800" height="2" fill="url(#goldFade)"/>
  <rect x="40" y="458" width="800" height="2" fill="url(#goldFade)"/>

  <text x="440" y="50" text-anchor="middle" font-family="ui-serif, 'Playfair Display', Georgia, serif" font-size="22" font-weight="700" fill="#f8f3e6">
    Pimp My Kebap <tspan fill="#d4af37" font-style="italic">·</tspan> Systemarchitektur
  </text>
  <text x="440" y="72" text-anchor="middle" class="body">Static-Site · WhatsApp Click-to-Chat · Kein Backend</text>

  <!-- USER LAYER -->
  <text x="60" y="115" class="label">User</text>
  <rect x="60" y="125" width="200" height="80" rx="10" class="card"/>
  <text x="160" y="153" text-anchor="middle" class="heading">Mobile / Desktop</text>
  <text x="160" y="173" text-anchor="middle" class="body">Browser (Chrome / Safari / Firefox)</text>
  <text x="160" y="190" text-anchor="middle" class="body">Service Worker + LocalStorage</text>

  <!-- SITE LAYER -->
  <text x="60" y="245" class="label">Auslieferung</text>
  <rect x="60" y="255" width="760" height="118" rx="10" class="card-strong"/>
  <text x="80" y="282" class="heading">GitHub Pages CDN <tspan class="body">(beko2210.github.io/pimp-my-kebap)</tspan></text>

  <g transform="translate(80,300)">
    <rect width="170" height="58" rx="6" class="pill"/>
    <text x="12" y="22" class="pill-text" font-weight="700">HTML-Routen</text>
    <text x="12" y="40" class="pill-text">/, /konfigurator,</text>
    <text x="12" y="52" class="pill-text">/speisekarte, /weiter, /404</text>
  </g>
  <g transform="translate(270,300)">
    <rect width="170" height="58" rx="6" class="pill"/>
    <text x="12" y="22" class="pill-text" font-weight="700">Assets</text>
    <text x="12" y="40" class="pill-text">CSS · JS-Module</text>
    <text x="12" y="52" class="pill-text">(Astro-Islands, hashed)</text>
  </g>
  <g transform="translate(460,300)">
    <rect width="170" height="58" rx="6" class="pill"/>
    <text x="12" y="22" class="pill-text" font-weight="700">Bilder</text>
    <text x="12" y="40" class="pill-text">AVIF · WebP · JPG</text>
    <text x="12" y="52" class="pill-text">Logo · Meals · Placeholders</text>
  </g>
  <g transform="translate(650,300)">
    <rect width="170" height="58" rx="6" class="pill"/>
    <text x="12" y="22" class="pill-text" font-weight="700">PWA</text>
    <text x="12" y="40" class="pill-text">manifest.webmanifest</text>
    <text x="12" y="52" class="pill-text">sw.js · offline.html</text>
  </g>

  <!-- RUNTIME LAYER -->
  <text x="60" y="408" class="label">Runtime im Browser</text>
  <rect x="60" y="418" width="370" height="38" rx="8" class="card"/>
  <text x="80" y="442" class="body">Cart-Store (nanostores) ⇄ localStorage (Zod, 24 h TTL)</text>

  <rect x="450" y="418" width="370" height="38" rx="8" class="card"/>
  <text x="470" y="442" class="body">WhatsApp Click-to-Chat → wa.me · keine Server-Roundtrips</text>

  <!-- ARROWS user → site -->
  <path d="M160,205 L160,255" class="arrow" marker-end="url(#arrow)"/>
  <text x="170" y="232" class="body" font-size="10">HTTPS · Pages</text>

  <!-- ARROWS site → runtime -->
  <path d="M245,373 L245,418" class="arrow" marker-end="url(#arrow)"/>
  <path d="M635,373 L635,418" class="arrow" marker-end="url(#arrow)"/>

  <!-- External stack badges right side -->
  <g transform="translate(295,125)">
    <text x="0" y="0" class="label">Stack</text>
    <rect x="0" y="10" width="525" height="80" rx="8" class="card"/>
    <text x="14" y="36" class="body"><tspan fill="#d4af37" font-weight="700">Astro 5</tspan> static · <tspan fill="#d4af37" font-weight="700">Tailwind v4</tspan> · <tspan fill="#d4af37" font-weight="700">TypeScript strict</tspan></text>
    <text x="14" y="54" class="body"><tspan fill="#d4af37" font-weight="700">nanostores</tspan> · <tspan fill="#d4af37" font-weight="700">Zod</tspan> · <tspan fill="#d4af37" font-weight="700">Vitest</tspan> · <tspan fill="#d4af37" font-weight="700">Playwright</tspan></text>
    <text x="14" y="74" class="body"><tspan fill="#ff6b1a" font-weight="700">Keine</tspan> Cookies · <tspan fill="#ff6b1a" font-weight="700">keine</tspan> Tracker · <tspan fill="#ff6b1a" font-weight="700">kein</tspan> Backend · DSGVO</text>
  </g>
</svg>
